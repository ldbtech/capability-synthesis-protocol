[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "csp"
version = "0.1.0"
description = "Capability Synthesis Runtime System — client library"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }

dependencies = [
    "aiohttp>=3.9",
    "orjson>=3.9",      # optional but strongly recommended — pure stdlib fallback exists
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "aioresponses>=0.7",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.hatch.build.targets.wheel]
packages = ["capos"]